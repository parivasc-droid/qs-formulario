<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiero Salirme — OSIPTEL</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f6f9;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;border:1px solid #dde3ec;border-radius:12px;padding:2rem;width:100%;max-width:380px;text-align:center}
.logo{background:#1a3a5c;border-radius:10px;padding:1rem 1.5rem;margin-bottom:1.5rem}
.logo h1{font-size:16px;font-weight:600;color:#fff}
.logo p{font-size:11px;color:#9bb8d4;margin-top:2px}
.msg{font-size:13px;color:#555;margin-bottom:1.5rem}
.btn{width:100%;padding:11px;background:#1a3a5c;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn:hover{background:#2e6da4}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <h1>Quiero Salirme — OSIPTEL</h1>
    <p>Registro de atenciones del programa</p>
  </div>
  <p class="msg" id="msg">Cargando...</p>
  <button class="btn" id="btn" style="display:none" onclick="netlifyIdentity.open('login')">Iniciar sesión</button>
</div>

<script>
var hash = window.location.hash;
var hasInvite   = hash.indexOf('invite_token=') > -1;
var hasRecovery = hash.indexOf('recovery_token=') > -1;

if (hasInvite || hasRecovery) {
  // Token present — open widget immediately after it loads
  document.getElementById('msg').textContent = hasRecovery
    ? 'Ingresa tu nueva contraseña.'
    : 'Crea tu contraseña para acceder.';

  window.netlifyIdentity = window.netlifyIdentity || {};

  var checkReady = setInterval(function() {
    if (typeof netlifyIdentity.open === 'function') {
      clearInterval(checkReady);
      netlifyIdentity.open();
      netlifyIdentity.on('login', function() {
        netlifyIdentity.close();
        window.location.href = '/QS_App.html';
      });
    }
  }, 100);

} else {
  // No token — normal login flow
  netlifyIdentity.on('init', function(user) {
    if (user) {
      window.location.href = '/QS_App.html';
    } else {
      document.getElementById('msg').textContent = 'Inicia sesión con tu correo institucional.';
      document.getElementById('btn').style.display = 'block';
    }
  });

  netlifyIdentity.on('login', function() {
    netlifyIdentity.close();
    window.location.href = '/QS_App.html';
  });
}
</script>
</body>
</html>
